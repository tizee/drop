<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>drop</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="drop">
<meta name="theme-color" content="#0a0a0a">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #161616;
    --border: #2a2a2a;
    --text: #e0e0e0;
    --text-dim: #888;
    --accent: #4a9eff;
    --accent-hover: #6ab4ff;
    --danger: #ff4a4a;
    --danger-hover: #ff6b6b;
    --success: #4aff8b;
    --radius: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    padding: 16px;
    padding-bottom: 32px;
    -webkit-tap-highlight-color: transparent;
  }

  h1 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  h1 span { color: var(--text-dim); font-weight: 400; font-size: 13px; }

  /* --- Tabs --- */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .tab {
    flex: 1;
    padding: 10px 0;
    text-align: center;
    font-size: 14px;
    font-weight: 500;
    background: var(--surface);
    color: var(--text-dim);
    border: none;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab.active { background: var(--accent); color: #fff; }
  .tab + .tab { border-left: 1px solid var(--border); }

  /* --- Panels --- */
  .panel { display: none; }
  .panel.active { display: block; }

  /* --- Upload zone --- */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 40px 16px;
    text-align: center;
    color: var(--text-dim);
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .upload-zone.dragover {
    border-color: var(--accent);
    background: rgba(74, 158, 255, 0.05);
  }
  .upload-zone input { display: none; }
  .upload-zone .icon { font-size: 28px; display: block; margin-bottom: 8px; }

  /* --- Text area --- */
  .text-input {
    width: 100%;
    min-height: 120px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 12px;
    font-size: 14px;
    font-family: "SF Mono", "Menlo", monospace;
    resize: vertical;
  }
  .text-input:focus { outline: none; border-color: var(--accent); }

  /* --- Buttons --- */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: 100%;
    padding: 12px 16px;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 12px;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: var(--danger-hover); }
  .btn-sm {
    width: auto;
    padding: 6px 10px;
    font-size: 12px;
    margin-top: 0;
  }

  /* --- Toast --- */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 20px;
    border-radius: var(--radius);
    font-size: 13px;
    transition: transform 0.25s ease;
    z-index: 100;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* --- History --- */
  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .history-header h2 { font-size: 15px; font-weight: 500; }

  .item-list { display: flex; flex-direction: column; gap: 8px; }

  .item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
  }
  .item-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 6px;
  }
  .item-type {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 6px;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .item-type.file { background: #1a3a5c; color: var(--accent); }
  .item-type.text { background: #1a4a2a; color: var(--success); }
  .item-type.clipboard { background: #4a3a1a; color: #ffb84a; }

  .item-name {
    font-size: 13px;
    word-break: break-all;
    flex: 1;
    min-width: 0;
  }
  .item-meta {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .item-path {
    font-family: "SF Mono", "Menlo", monospace;
    font-size: 12px;
    background: var(--bg);
    padding: 8px 10px;
    border-radius: 4px;
    word-break: break-all;
    margin-bottom: 8px;
    color: var(--accent);
    user-select: all;
    -webkit-user-select: all;
  }
  .item-actions {
    display: flex;
    gap: 8px;
  }
  .item-actions .btn-sm { flex: 1; }
  .btn-copy { background: #1a3a5c; color: var(--accent); }
  .btn-copy:hover { background: #244a6c; }
  .btn-del { background: #3a1a1a; color: var(--danger); }
  .btn-del:hover { background: #4a2a2a; }

  .empty {
    text-align: center;
    color: var(--text-dim);
    padding: 40px 16px;
    font-size: 14px;
  }

  .preview-text {
    font-size: 12px;
    color: var(--text-dim);
    font-family: "SF Mono", "Menlo", monospace;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 60px;
    overflow: hidden;
    margin-bottom: 8px;
    padding: 6px 8px;
    background: var(--bg);
    border-radius: 4px;
  }
  [contenteditable][data-placeholder]:empty::before {
    content: attr(data-placeholder);
    color: var(--text-dim);
    pointer-events: none;
  }

  .preview-img {
    max-width: 100%;
    max-height: 100px;
    border-radius: 4px;
    margin-bottom: 8px;
  }

  /* --- Connection Status --- */
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: background-color 0.3s;
  }
  .status-dot.connected { background: var(--success); }
  .status-dot.disconnected { background: var(--danger); animation: pulse-dot 1.5s infinite; }
  .status-dot.checking { background: var(--text-dim); }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-dim);
    padding: 6px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    transition: border-color 0.3s;
  }
  .status-bar.disconnected {
    border-color: var(--danger);
    color: var(--danger);
  }
  .status-bar .status-text { flex: 1; }
  .status-bar .status-latency { font-family: "SF Mono", "Menlo", monospace; font-size: 10px; }
</style>
</head>
<body>

<h1>drop <span>LAN inbox</span></h1>

<div class="status-bar" id="status-bar">
  <span class="status-dot checking" id="status-dot"></span>
  <span class="status-text" id="status-text">Checking connection...</span>
  <span class="status-latency" id="status-latency"></span>
</div>

<div class="tabs">
  <button class="tab active" data-tab="file">File</button>
  <button class="tab" data-tab="text">Text</button>
  <button class="tab" data-tab="clipboard">Clipboard</button>
</div>

<!-- File upload panel -->
<div id="panel-file" class="panel active">
  <div class="upload-zone" id="upload-zone">
    <span class="icon">+</span>
    Tap to select or drag files here
    <input type="file" id="file-input" multiple>
  </div>
</div>

<!-- Text panel -->
<div id="panel-text" class="panel">
  <textarea class="text-input" id="text-input" placeholder="Paste or type text here..."></textarea>
  <button class="btn btn-primary" id="text-submit">Send Text</button>
</div>

<!-- Clipboard panel -->
<div id="panel-clipboard" class="panel">
  <div id="paste-zone" contenteditable="true" class="text-input" style="min-height:120px;overflow:auto;" data-placeholder="Long-press and paste here (text or image)"></div>
  <button class="btn btn-primary" id="paste-submit">Send Pasted Content</button>
</div>

<!-- History -->
<div style="margin-top: 24px;">
  <div class="history-header">
    <h2>History</h2>
    <button class="btn btn-danger btn-sm" id="clear-all" style="display:none;">Clear All</button>
  </div>
  <div id="item-list" class="item-list">
    <div class="empty">No items yet</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// Generate apple-touch-icon from SVG at runtime
(function generateAppleTouchIcon() {
  const img = new Image();
  img.onload = function() {
    const canvas = document.createElement("canvas");
    canvas.width = 180;
    canvas.height = 180;
    const ctx = canvas.getContext("2d");
    // Fill with app background color
    ctx.fillStyle = "#0a0a0a";
    ctx.fillRect(0, 0, 180, 180);
    // Center the icon with padding
    const pad = 30;
    const s = 180 - pad * 2;
    ctx.drawImage(img, pad, pad, s, s);
    const link = document.createElement("link");
    link.rel = "apple-touch-icon";
    link.href = canvas.toDataURL("image/png");
    document.head.appendChild(link);
  };
  img.src = "/favicon.svg";
})();
</script>
<script>
const $ = (s) => document.querySelector(s);
const API = "";

// --- Toast ---
let toastTimer;
function toast(msg) {
  const el = $("#toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2000);
}

// --- Tabs ---
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    tab.classList.add("active");
    $(`#panel-${tab.dataset.tab}`).classList.add("active");
  });
});

// --- File upload ---
const uploadZone = $("#upload-zone");
const fileInput = $("#file-input");

uploadZone.addEventListener("click", () => fileInput.click());
uploadZone.addEventListener("dragover", (e) => {
  e.preventDefault();
  uploadZone.classList.add("dragover");
});
uploadZone.addEventListener("dragleave", () => uploadZone.classList.remove("dragover"));
uploadZone.addEventListener("drop", (e) => {
  e.preventDefault();
  uploadZone.classList.remove("dragover");
  uploadFiles(e.dataTransfer.files);
});
fileInput.addEventListener("change", () => {
  if (fileInput.files.length) uploadFiles(fileInput.files);
  fileInput.value = "";
});

async function uploadFiles(files) {
  for (const file of files) {
    const fd = new FormData();
    fd.append("file", file);
    try {
      const res = await fetch(`${API}/api/upload`, { method: "POST", body: fd });
      if (!res.ok) throw new Error(await res.text());
      toast(`Uploaded: ${file.name}`);
    } catch (e) {
      toast(`Failed: ${e.message}`);
    }
  }
  refresh();
}

// --- Text submit ---
$("#text-submit").addEventListener("click", async () => {
  const text = $("#text-input").value.trim();
  if (!text) return toast("Empty text");
  try {
    const res = await fetch(`${API}/api/text`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text }),
    });
    if (!res.ok) throw new Error(await res.text());
    $("#text-input").value = "";
    toast("Text saved");
    refresh();
  } catch (e) {
    toast(`Failed: ${e.message}`);
  }
});

// --- Clipboard (paste event, no Clipboard API needed) ---
const pasteZone = $("#paste-zone");
let pastedImages = []; // collected from paste events

pasteZone.addEventListener("paste", (e) => {
  const items = e.clipboardData?.items;
  if (!items) return;

  for (const item of items) {
    if (item.type.startsWith("image/")) {
      e.preventDefault();
      const blob = item.getAsFile();
      if (!blob) continue;
      pastedImages.push(blob);
      // Show visual indicator
      const img = document.createElement("img");
      img.src = URL.createObjectURL(blob);
      img.style.maxWidth = "100%";
      img.style.maxHeight = "120px";
      img.style.borderRadius = "4px";
      img.style.marginTop = "4px";
      pasteZone.appendChild(img);
      return;
    }
    // Text pastes are handled natively by contenteditable
  }
});

$("#paste-submit").addEventListener("click", async () => {
  try {
    let sent = false;

    // Upload pasted images
    for (const blob of pastedImages) {
      const ext = (blob.type.split("/")[1]) || "png";
      const file = new File([blob], `clipboard.${ext}`, { type: blob.type });
      const fd = new FormData();
      fd.append("file", file);
      const res = await fetch(`${API}/api/clipboard`, { method: "POST", body: fd });
      if (!res.ok) throw new Error(await res.text());
      sent = true;
    }

    // Upload pasted text
    const text = pasteZone.innerText.trim();
    if (text) {
      const res = await fetch(`${API}/api/clipboard`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text }),
      });
      if (!res.ok) throw new Error(await res.text());
      sent = true;
    }

    if (!sent) return toast("Nothing to send");

    // Clear
    pasteZone.innerHTML = "";
    pastedImages = [];
    toast("Clipboard content saved");
    refresh();
  } catch (e) {
    toast(`Failed: ${e.message}`);
  }
});

// --- History ---
function formatSize(bytes) {
  if (bytes < 1024) return `${bytes} B`;
  if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
  return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
}

function formatTime(ts) {
  const d = new Date(ts);
  const pad = (n) => String(n).padStart(2, "0");
  return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function isImage(filename) {
  return /\.(png|jpg|jpeg|gif|webp|svg|bmp|ico)$/i.test(filename);
}

function renderItems(items) {
  const list = $("#item-list");
  const clearBtn = $("#clear-all");

  if (!items.length) {
    list.innerHTML = '<div class="empty">No items yet</div>';
    clearBtn.style.display = "none";
    return;
  }

  clearBtn.style.display = "inline-flex";
  list.innerHTML = items.map(item => {
    let preview = "";
    if (item.type === "text" || (item.type === "clipboard" && item.filename.endsWith(".txt"))) {
      preview = `<div class="preview-text" id="preview-${item.id}">Loading...</div>`;
    } else if (isImage(item.filename)) {
      preview = `<img class="preview-img" src="${API}/raw/${encodeURIComponent(item.id)}" alt="preview">`;
    }

    return `
      <div class="item">
        <div class="item-top">
          <span class="item-type ${item.type}">${item.type}</span>
          <span class="item-name">${escapeHtml(item.filename)}</span>
        </div>
        <div class="item-meta">${formatSize(item.size)} · ${formatTime(item.createdAt)}</div>
        ${preview}
        <div class="item-path">${escapeHtml(item.path)}</div>
        <div class="item-actions">
          <button class="btn btn-sm btn-copy" onclick="copyPath('${escapeAttr(item.path)}')">Copy Path</button>
          <button class="btn btn-sm btn-del" onclick="deleteItem('${escapeAttr(item.id)}')">Delete</button>
        </div>
      </div>
    `;
  }).join("");

  // Load text previews
  items.forEach(item => {
    if (item.type === "text" || (item.type === "clipboard" && item.filename.endsWith(".txt"))) {
      fetch(`${API}/raw/${encodeURIComponent(item.id)}`)
        .then(r => r.text())
        .then(text => {
          const el = document.getElementById(`preview-${item.id}`);
          if (el) el.textContent = text.slice(0, 200) + (text.length > 200 ? "..." : "");
        });
    }
  });
}

function escapeHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function escapeAttr(s) {
  return s.replace(/\\/g, "\\\\").replace(/'/g, "\\'");
}

async function refresh() {
  try {
    const res = await fetch(`${API}/api/items`);
    const items = await res.json();
    renderItems(items);
  } catch {
    // silent
  }
}

window.copyPath = async function(path) {
  try {
    await navigator.clipboard.writeText(path);
    toast("Path copied!");
  } catch {
    // Fallback
    const ta = document.createElement("textarea");
    ta.value = path;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    toast("Path copied!");
  }
};

window.deleteItem = async function(id) {
  try {
    await fetch(`${API}/api/items/${encodeURIComponent(id)}`, { method: "DELETE" });
    toast("Deleted");
    refresh();
  } catch (e) {
    toast(`Failed: ${e.message}`);
  }
};

$("#clear-all").addEventListener("click", async () => {
  if (!confirm("Clear all items?")) return;
  try {
    await fetch(`${API}/api/items`, { method: "DELETE" });
    toast("All cleared");
    refresh();
  } catch (e) {
    toast(`Failed: ${e.message}`);
  }
});

// --- Connection status via Web Worker ---
const workerCode = `
  let interval = null;
  let baseUrl = "";

  self.onmessage = function(e) {
    if (e.data.type === "init") {
      baseUrl = e.data.baseUrl;
      checkHealth();
      interval = setInterval(checkHealth, 4000);
    }
    if (e.data.type === "check") {
      checkHealth();
    }
  };

  async function checkHealth() {
    const start = Date.now();
    try {
      const res = await fetch(baseUrl + "/api/health", { signal: AbortSignal.timeout(5000) });
      const latency = Date.now() - start;
      if (res.ok) {
        self.postMessage({ status: "connected", latency });
      } else {
        self.postMessage({ status: "disconnected", latency, reason: "HTTP " + res.status });
      }
    } catch (e) {
      self.postMessage({ status: "disconnected", latency: Date.now() - start, reason: e.message || "Network error" });
    }
  }
`;

const healthWorker = new Worker(
  URL.createObjectURL(new Blob([workerCode], { type: "application/javascript" }))
);

healthWorker.postMessage({ type: "init", baseUrl: location.origin });

let wasConnected = null;

healthWorker.onmessage = function(e) {
  const { status, latency, reason } = e.data;
  const dot = $("#status-dot");
  const text = $("#status-text");
  const bar = $("#status-bar");
  const lat = $("#status-latency");

  dot.className = "status-dot " + status;
  bar.className = "status-bar" + (status === "disconnected" ? " disconnected" : "");

  if (status === "connected") {
    text.textContent = "Connected";
    lat.textContent = latency + "ms";
    // Auto-refresh items when reconnecting
    if (wasConnected === false) {
      refresh();
      toast("Reconnected to server");
    }
  } else {
    text.textContent = "Disconnected" + (reason ? " - " + reason : "");
    lat.textContent = "";
  }
  wasConnected = status === "connected";
};

// Initial load + auto-refresh every 5s
refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
